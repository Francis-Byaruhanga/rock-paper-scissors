<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <script src="scripts.js"></script>
</head>
<body>
   <div class="scanlines"></div>

   <main class="container">
        <header class="header">
            <h1 class="title">
                <span class="title-rock">ROCK</span>
                <span class="title-sep">.</span>
                <span class="title-paper">PAPER</span>
                <span class="title-sep">.</span>
                <span class="title-scissors">SCISSORS</span>
            </h1>
            <p class="subtitle">First to 5 wins the crown</p>
        </header>

        <!-- Scoreboard -->
        <section class="scoreboard" aria-label="Scoreboard">
            <div class="score-card score-card--player">
                <span class="score-label">YOU</span>
                <span class="score-value" id="human-score">0</span>
            </div>

            <div class="vs-badge">VS</div>

            <div class="score-card score-card--computer">
                <span class="score-label">CPU</span>
                <span class="score-value" id="computer-score">0</span>
            </div>
        </section>

        <!-- Battle Arena -->
        <section class="arena" aria-label="Battle arena">
            <div class="combatant combatant--player">
                <div class="choice-display" id="player-choice-display">
                    <span class="choice-emoji" id="player-emoji">❓</span>
                </div>
            </div>

            <span class="combatant-label">Your Pick</span>


            <div class="clash-zone">
                <div class="clash-icon" id="clash-icon">⚡</div>
            </div>

            <div class="combatant combatant--computer">
                <div class="choice-display" id="computer-choice-display">
                    <span class="choice-emoji" id="computer-emoji">❓</span>
                </div>
                <span class="combatant-label">CPU Pick</span>
            </div>
        </section>

        <!-- Results Message -->
        <div class="result-banner" id="result-banner" aria-live="polite">
            <p id="result-text">Choose your weapon!</p>
        </div>

        <!-- Play Choice Buttons -->
        <section class="controls" aria-label="Player controls">
            <button class="choice-btn" id="btn-rock" data-choice="Rock" aria-label="Choose Rock">
                <span class="btn-emoji">🪨</span>
                <span class="btn-label">ROCK</span>
            </button>
            <button class="choice-btn" id="btn-paper" data-choice="Paper" aria-label="Choose Paper">
                <span class="btn-emoji">📄</span>
                <span class="btn-label">PAPER</span>
            </button>
            <button class="choice-btn" id="btn-scissors" data-choice="Scissors" aria-label="Choose Scissors">
                <span class="btn-emoji">✂️</span>
                <span class="btn-label">SCISSORS</span>
            </button>
        </section>

   </main>
</body>
</html>
